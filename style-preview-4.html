<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 4 - Warm & Cozy</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: linear-gradient(160deg, #f5e6d3 0%, #ead5bc 60%, #d4b896 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .label {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(101,67,33,0.8);
    color: #f5e6d3;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .card {
    background: #fffaf4;
    border-radius: 24px;
    padding: 48px 44px;
    max-width: 540px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(101,67,33,0.15);
    border: 1px solid rgba(101,67,33,0.08);
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }
  .coffee-icon { font-size: 22px; }
  .brand {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 600;
    color: #8b5e3c;
    letter-spacing: 0.3px;
  }
  .progress {
    height: 6px;
    background: #ede0d0;
    border-radius: 3px;
    margin-bottom: 40px;
  }
  .progress-fill {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, #c8813a, #e09c5a);
    border-radius: 3px;
  }
  h1 {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 600;
    color: #3d2314;
    margin-bottom: 32px;
    line-height: 1.4;
  }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    padding: 16px 20px;
    border-radius: 14px;
    border: 2px solid #ede0d0;
    font-size: 15px;
    font-weight: 500;
    color: #5c3d2e;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option:hover { border-color: #c8813a; background: #fdf5eb; }
  .option.selected { border-color: #c8813a; background: #fdf0e0; color: #3d2314; }
  .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid #d4b896;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option.selected .dot { border-color: #c8813a; background: #c8813a; }
  .option.selected .dot::after { content: ''; width: 6px; height: 6px; background: white; border-radius: 50%; }
  .next-btn {
    margin-top: 32px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #c8813a, #e09c5a);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="label">STYLE 4 — Warm & Cozy</div>
<div class="card">
  <div class="header">
    <span class="coffee-icon">☕</span>
    <span class="brand">Coffee Personality Quiz</span>
  </div>
  <div class="progress"><div class="progress-fill"></div></div>
  <h1>It's Friday night. What are you watching?</h1>
  <div class="options">
    <div class="option selected"><div class="dot"></div> An action-packed thriller — edge of my seat</div>
    <div class="option"><div class="dot"></div> A calm documentary — something to learn from</div>
    <div class="option"><div class="dot"></div> A comedy with friends — the more the merrier</div>
    <div class="option"><div class="dot"></div> Whatever's on — I'm not picky</div>
  </div>
  <button class="next-btn">Next Question</button>
</div>
</body>
</html>
